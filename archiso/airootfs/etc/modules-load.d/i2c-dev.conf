# Ziel im Archiso-Profil: airootfs/etc/modules-load.d/i2c-dev.conf
#
# Laedt das i2c-dev Kernelmodul beim Boot - noetig, damit /dev/i2c-*
# Geraete ueberhaupt existieren, ueber die ddcutil mit externen
# Monitoren per DDC/CI spricht (Helligkeit/Kontrast fernsteuern).
# Ohne dieses Modul sieht ddcutil gar keine Monitore, selbst wenn sie
# angeschlossen und DDC-faehig sind.
i2c-dev
