---
showSupportUrl: true
showKnownIssuesUrl: true
showReleaseNotesUrl: true

requirements:
  # in GiB, Kommazahlen erlaubt - NICHT in Bytes angeben!
  requiredStorage: 8.0
  requiredRam: 2.0

  internetCheckUrl: "http://example.com"

  # Welche Bedingungen ueberhaupt geprueft/angezeigt werden
  check:
    - storage
    - ram
    - internet
    - root

  # Welche davon PFLICHT sind, um weiterklicken zu koennen.
  # "root" bewusst NICHT als Pflicht, damit du im Debug-Modus als
  # normaler User (ohne sudo/pkexec) testen kannst. Beim echten Lauf
  # via "pkexec calamares" bist du eh root, das stoert also nicht.
  required:
    - ram
