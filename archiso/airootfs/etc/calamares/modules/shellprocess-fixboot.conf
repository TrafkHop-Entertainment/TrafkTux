---
dontChroot: false
timeout: 30
script:
  # --- ISO-spezifische Boot-Dateien reparieren, BEVOR initcpiocfg/initcpio
  #     und bootloader/grubcfg laufen ---
  # unpackfs hat gerade die komplette airootfs.sfs (Live-System) 1:1 aufs
  # Zielsystem kopiert. Das Live-System braucht aber ein anderes
  # mkinitcpio-Preset (Hooks wie archiso, archiso_loop_mnt, memdisk,
  # archiso_pxe_* - die nur zum Booten vom ISO-Medium/USB dienen) als das
  # fertig installierte System. Laesst man das kaputte Live-Preset hier
  # liegen, bauen die NACHFOLGENDEN Calamares-Module initcpio/bootloader
  # bereits mit den falschen Dateien - der Schaden ist dann schon passiert,
  # bevor irgendein spaeterer Cleanup-Schritt greifen koennte.
  - rm -f /etc/mkinitcpio.d/linux.preset
  - |
    cat > /etc/mkinitcpio.d/linux.preset << 'EOF'
    # mkinitcpio preset file for the 'linux' package

    PRESETS=('default' 'fallback')

    ALL_kver="/boot/vmlinuz-linux"

    #default_config="/etc/mkinitcpio.conf"
    default_image="/boot/initramfs-linux.img"

    #fallback_config="/etc/mkinitcpio.conf"
    fallback_image="/boot/initramfs-linux-fallback.img"
    fallback_options="-S autodetect"
    EOF
  - rm -rf /etc/mkinitcpio.conf.d
  # Falls MODULES=() im ISO-Profil durch Hook-Namen statt echten
  # Kernelmodul-Namen ueberschrieben wurde, hier zuruecksetzen. Das
  # nachfolgende initcpiocfg-Modul von Calamares ergaenzt HOOKS= je nach
  # Partitionslayout (verschluesselung, lvm, usw.) ohnehin korrekt.
  - sed -i 's/^MODULES=.*/MODULES=()/' /etc/mkinitcpio.conf

  # Ausfuehrungsrechte fuer alle grub.d-Skripte sicherstellen - ohne
  # x-Bit auf 10_linux erzeugt grub-mkconfig KEINEN Kernel-Booteintrag,
  # ohne dass irgendein Fehler angezeigt wird.
  - chmod 755 /etc/grub.d/*
