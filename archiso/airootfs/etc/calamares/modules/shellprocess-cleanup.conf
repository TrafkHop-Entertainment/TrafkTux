---
dontChroot: false
timeout: 15
script:
  - rm -f /etc/sudoers.d/99-liveuser
  - rm -f /etc/polkit-1/rules.d/60-trafktux-calamares.rules
  - rm -f /usr/share/applications/calamares.desktop
  - rm -f /etc/pacman.d/hooks/liveuser.hook
  - rm -f /usr/local/bin/create-liveuser.sh

# Diese Dateien sind NUR fuer die Live-Session gedacht (passwortloser
# liveuser). Ohne diesen Schritt haette der spaeter angelegte, echte
# Benutzer dauerhaft passwortlosen sudo- und polkit-Zugriff auf dem
# fertig installierten System. Falls du das absichtlich WILLST (z.B.
# bewusst ein bequemes Ein-Personen-System), einfach diese Datei leeren.
