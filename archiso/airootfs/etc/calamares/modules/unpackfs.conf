---
unpack:
  - source: "/run/archiso/bootmnt/arch/x86_64/airootfs.sfs"
    sourcefs: "squashfs"
    destination: ""

# WICHTIG: Der "source"-Pfad muss zu 100% mit dem Ort passen, wo dein
# gebootetes Live-System die airootfs.sfs tatsaechlich einhaengt.
# install_dir="arch" (aus profiledef.sh) -> daher ".../arch/x86_64/..."
# Zum Pruefen im gebooteten Live-System einfach:
#   mount | grep -i airootfs
# ausfuehren und den Pfad ggf. anpassen.
