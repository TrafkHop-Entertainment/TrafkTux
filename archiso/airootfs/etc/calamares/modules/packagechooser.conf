---
mode: optionalmultiple
method: packages

labels:
  step: "Zusätzliche Pakete"

items:
  - id: pamac
    name: "Pamac (grafischer Paketmanager)"
    description: "GUI-Alternative zu reinem pacman/yay."
    packages: [ pamac-all ]

  - id: hyprextras
    name: "Hyprland Extras"
    description: "hyprshade (Bildschirmfilter) und hyprland-minimizer."
    packages: [ hyprshade, hyprland-minimizer-git ]

  - id: wvkbd
    name: "Bildschirmtastatur (wvkbd)"
    description: "Nuetzlich fuer Tablets/Touchscreens."
    packages: [ wvkbd ]

  - id: xwaylandvideobridge
    name: "XWaylandVideoBridge"
    description: "Bildschirmfreigabe von Wayland-Apps in X11-Programmen (z.B. manche Videokonferenz-Tools)."
    packages: [ xwaylandvideobridge ]

# Alle Pakete hier oben MUESSEN ueber ein Repo installierbar sein, das
# schon in pacman.conf eingetragen ist (siehe build-local-repo.sh) -
# Calamares kann selbst kein "yay -S" ausfuehren.
