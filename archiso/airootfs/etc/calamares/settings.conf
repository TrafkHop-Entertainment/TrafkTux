---
modules-search: [ local ]

instances:
- id:       cleanup
  module:   shellprocess
  config:   shellprocess-cleanup.conf
- id:       aurinstall
  module:   shellprocess
  config:   shellprocess-aurinstall.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - initcpiocfg
  - initcpio
  - removeuser
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - shellprocess@aurinstall
  - grubcfg
  - bootloader
  - shellprocess@cleanup
  - umount
- show:
  - finished

branding: trafktux

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false
