# HINTERGRUND
background {
    monitor =
    # Hintergrundfarbe: #23163B
    color = rgb(35, 22, 59)
}

# LOCK LOGO (Oben Mitte)
image {
    monitor =
    path = ~/.config/hypr/hyprlock.png       # WICHTIG: Pfad zu deinem Lock-Icon anpassen!
    size = 215                     # Größe des Logos
    rounding = 0                   # 0 = Transparenz des PNGs wird exakt beibehalten
    border_size = 0
    position = 0, 285              # Positionierung auf der Y-Achse nach oben
    halign = center
    valign = center
}

# BUBBLE BILD (Hinter dem Passwortfeld)
image {
    monitor =
    path = ~/.config/rofi/assets/bubble-normal.png # WICHTIG: Pfad zu deinem Bubble-Bild anpassen!
    size = 350                        # Größe des Bubbles (muss größer als das Textfeld sein)
    rounding = 0
    border_size = 0
    position = 0, -215                 # Positionierung nach unten
    halign = center
    valign = center
}

# PASSWORTFELD (Unsichtbare Box, sichtbarer Text)
input-field {
    monitor =
    size = 45                    # Größe des eigentlichen Eingabebereichs im Bubble
    outline_thickness = 0
    dots_size = 0.15
    dots_spacing = 0.15
    dots_center = true

    # Mache die Box komplett transparent, damit nur das Bubble-Bild sichtbar ist
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)

    # Schriftfarbe: #fff495
    font_color = rgb(255, 244, 149)

    fade_on_empty = false
    # Text, der im Bubble steht, bevor man tippt
    placeholder_text = <span foreground="##fff495">Passwort</span>
    hide_input = false

    # Exakt gleiche Position wie das Bubble-Bild, damit der Text mittig darin sitzt!
    position = 0, -215
    halign = center
    valign = center
}
