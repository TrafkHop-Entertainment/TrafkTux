#  -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
#  KITTY CONFIG                                             --
#  -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --

# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# -- SCHRIFTART                                            --
# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# Nerd Font, damit Icons/Glyphen (wie in waybar) auch im Terminal
# (z.B. in btop, lsd, starship, ...) korrekt dargestellt werden.
# Falls nicht installiert: paru -S ttf-jetbrains-mono-nerd
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        8.0
disable_ligatures never
adjust_line_height  0
adjust_column_width 0

# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# -- FENSTER / PADDING                                     --
# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# Eckenradius macht ohnehin Hyprland (decoration.rounding = 15),
# kitty selbst braucht hier nichts zu tun.
window_padding_width 15
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size  no
initial_window_width  640
initial_window_height 480

# Transparenz bewusst aus: solange blur.enabled = false in der
# hyprland.lua steht, sieht ein durchsichtiges Terminal nur kaputt
# aus statt schick. Wenn du Blur aktivierst, einfach die nächsten
# zwei Zeilen entkommentieren:
# background_opacity 0.90
# dynamic_background_opacity yes

# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# -- CURSOR                                                --
# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
cursor_shape          beam
cursor_beam_thickness  1.5
cursor_blink_interval   0

# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# -- SCROLLBACK / VERHALTEN                                --
# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
scrollback_lines     10000
enable_audio_bell    no
update_check_interval 0
shell_integration    enabled
allow_remote_control  no
copy_on_select       yes
mouse_hide_wait      3.0

# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# -- TAB-LEISTE                                            --
# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template     "{index}: {title}"

# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# -- FARBEN                                                --
# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
background            #23163B
foreground            #e8e6e1

cursor                #fff495
cursor_text_color     #23163B

selection_background   #fff495
selection_foreground   #23163B

url_color             #fff495
url_style             curly

# Fenster-/Split-Border (nur relevant, wenn du kitty selbst
# splittest, also nicht über Hyprland tiled)
active_border_color    #fff495
inactive_border_color   #595959
bell_border_color      #ff5555

active_tab_background  #fff495
active_tab_foreground  #23163B
inactive_tab_background #262626
inactive_tab_foreground #888888

# 16-Farben-Palette: gold (#fff495) sitzt auf bright yellow,
# das Rot entspricht dem Close-Button-Rot aus hyprbars.
color0  #1c1c1c
color8  #595959

color1  #ff5555
color9  #ff7a7a

color2  #a8cc8c
color10 #c2e6a6

color3  #d9c97a
color11 #fff495

color4  #7aa2cc
color12 #9cc4e6

color5  #c792ea
color13 #e0b3ff

color6  #7adbcc
color14 #9cf0e0

color7  #e8e6e1
color15 #ffffff

# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# -- TASTENKÜRZEL                                          --
# -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- --
# Bewusst NICHT mit SUPER, das ist dein Hyprland-Mod (siehe
# hyprland.lua) - hier bleibt alles bei ctrl+shift, wie kitty
# es standardmäßig macht, damit nichts kollidiert.
map ctrl+shift+c       copy_to_clipboard
map ctrl+shift+v       paste_from_clipboard
map ctrl+shift+t       new_tab
map ctrl+shift+w       close_tab
map ctrl+shift+right   next_tab
map ctrl+shift+left    previous_tab
map ctrl+equal   change_font_size all +1.0
map ctrl+minus   change_font_size all -1.0
map ctrl+shift+0       change_font_size all 0
map ctrl+shift+f5      load_config_file
